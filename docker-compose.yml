services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      DB_PATH: /app/data/shop.db
      REDIS_ADDR: redis:6379
    volumes:
      - bot_data:/app/data
      - bot_backups:/app/backups
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  bot_data:
  bot_backups:
  redis_data:
